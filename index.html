:RMA=1:2,SEV:ATH=2:0,ALA:ESP=1:2,ATM:BET=3:0,CSC:GET=3:0,RAY:LEV=2:0,SPO:LPA=2:2','ESP:OSA=1:3,LPA:DEP=0:2,ATH:BAR=1:1,GET:RAY=2:0,VCF:CSC=1:3,LEV:ALA=2:0,BET:ATM=0:1,RSO:SPO=3:0,VLL:VIL=1:0,RMA:SEV=4:0','BET:ALA=2:1,VLL:SPO=2:0,LPA:BAR=1:2,GET:VCF=0:2,RSO:SEV=1:1,RMA:OSA=3:0,ATH:ATM=2:2,DEP:VIL=1:2,ESP:RAY=1:1,LEV:CSC=3:1','LEV:VCF,ATH:OSA,VLL:BAR,ESP:CSC,DEP:SPO,LPA:SEV,BET:RAY,GET:VIL,RMA:ALA,RSO:ATM','SEV:VLL,OSA:RSO,VCF:ESP,ATM:LPA,ALA:ATH,VIL:SPO,GET:LEV,CSC:BET,BAR:DEP,RAY:RMA','ATH:RAY,DEP:SEV,VLL:ATM,RSO:ALA,LEV:VIL,BET:VCF,SPO:BAR,LPA:OSA,RMA:CSC,ESP:GET','BAR:VIL,ALA:LPA,GET:BET,SEV:SPO,ATM:DEP,OSA:VLL,LEV:ESP,VCF:RMA,RAY:RSO,CSC:ATH','VIL:ESP,DEP:OSA,ATH:VCF,LPA:RAY,SPO:ATM,VLL:ALA,RSO:CSC,RMA:GET,BET:LEV,BAR:SEV','ESP:BET,VCF:RSO,LEV:RMA,SEV:VIL,ATM:BAR,CSC:LPA,OSA:SPO,ALA:DEP,RAY:VLL,GET:ATH','LPA:VCF,RMA:ESP,VLL:CSC,VIL:BET,SEV:ATM,BAR:OSA,ATH:LEV,DEP:RAY,SPO:ALA,RSO:GET','RSO:ESP,VLL:GET,SPO:CSC,ATM:OSA,SEV:ALA,LPA:LEV,VIL:RMA,ATH:BET,BAR:RAY,DEP:VCF','ATM:VIL,GET:LPA,VCF:VLL,BET:RMA,ESP:ATH,ALA:BAR,OSA:SEV,CSC:DEP,RAY:SPO,LEV:RSO','LEV:VLL,ESP:LPA,GET:DEP,RAY:SEV,RMA:ATH,ALA:ATM,CSC:BAR,VCF:SPO,OSA:VIL,BET:RSO','SPO:GET,DEP:LEV,LPA:BET,OSA:ALA,RSO:RMA,VIL:ATH,SEV:CSC,BAR:VCF,VLL:ESP,ATM:RAY','ALA:VIL,RMA:LPA,GET:BAR,ESP:DEP,VCF:SEV,ATH:RSO,CSC:ATM,BET:VLL,RAY:OSA,LEV:SPO','GET:ATM,RSO:LPA,LEV:SEV,CSC:ALA,ESP:BAR,VCF:OSA,RMA:DEP,ATH:VLL,RAY:VIL,BET:SPO','VIL:RSO,VLL:RMA,ATM:VCF,BAR:LEV,OSA:CSC,DEP:BET,SEV:GET,ALA:RAY,SPO:ESP,LPA:ATH','DEP:ATH,VIL:LPA,VLL:RSO,BAR:BET,OSA:GET,RAY:CSC,ATM:LEV,SPO:RMA,ALA:VCF,SEV:ESP','BET:SEV,CSC:VIL,ESP:ATM,LEV:OSA,RSO:DEP,GET:ALA,LPA:VLL,ATH:SPO,RMA:BAR,VCF:RAY','VCF:VIL,RSO:BAR,VLL:DEP,RMA:ATM,ATH:SEV,ESP:ALA,BET:ATM,GET:CSC,LEV:RAY,LPA:SPO','OSA:ESP,DEP:LPA,BAR:ATH,RAY:GET,CSC:VCF,ALA:LEV,ATM:BET,SPO:RSO,VIL:VLL,SEV:RMA','ALA:BET,SPO:VLL,BAR:LPA,VCF:GET,SEV:RSO,OSA:RMA,ATM:ATH,VIL:DEP,RAY:ESP,LEV:SPO'];

/* Estado por defecto */
var S={md:[],zones:{chl:[1,2,3,4],ell:[5],ccl:[6],desc:[18,19,20]},manual:false,mo:null,tab:'clas',ji:0};

function parseMD(){S.md=DM.map(function(d){return d.split(',').map(function(m){if(m.indexOf('=')>-1){var h=m.split('=');var gs=h[1].split(':');var t=h[0].split(':');return{l:t[0],v:t[1],g1:parseInt(gs[0]),g2:parseInt(gs[1]),played:true}}var t=m.split(':');return{l:t[0],v:t[1],g1:null,g2:null,played:false}})})}

/* ===== PERSISTENCIA ROBUSTA ===== */
var STORAGE_KEY='liga_easports_2045';

function save(){
  try{
    var data=JSON.stringify({
      md:S.md,
      z:S.zones,
      man:S.manual,
      mo:S.mo,
      tab:S.tab,
      ji:S.ji,
      v:2
    });
    localStorage.setItem(STORAGE_KEY,data);
    showSave();
  }catch(e){
    /* Si localStorage falla, intentar con ubicación hash como respaldo */
    try{
      var short=JSON.stringify({md:S.md,z:S.zones,man:S.manual,mo:S.mo,tab:S.tab,ji:S.ji,v:2});
      if(short.length<50000){
        window.location.hash='d='+encodeURIComponent(short);
      }
    }catch(e2){}
  }
}

function load(){
  var data=null;
  /* Intentar leer localStorage */
  try{data=JSON.parse(localStorage.getItem(STORAGE_KEY))}catch(e){}
  /* Si no hay en localStorage, intentar desde hash */
  if(!data){
    try{
      var h=window.location.hash;
      if(h.indexOf('d=')===0){
        data=JSON.parse(decodeURIComponent(h.substring(2)));
        /* Mover a localStorage para futuro */
        localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
        window.location.hash='';
      }
    }catch(e){}
  }
  if(!data)return;
  /* Cargar datos */
  if(data.md&&data.md.length===38){S.md=data.md}
  if(data.z){S.zones=data.z}
  if(typeof data.man==='boolean'){S.manual=data.man}
  if(data.mo){S.mo=data.mo}
  if(data.tab==='clas'||data.tab==='jorn'){S.tab=data.tab}
  if(typeof data.ji==='number'&&data.ji>=0&&data.ji<38){S.ji=data.ji}
}

function showSave(){
  var el=document.getElementById('saveInd');
  if(el){el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show')},1200)}
}

/* Inicializar: primero parsear por defecto, luego sobrescribir con lo guardado */
parseMD();
load();

function calc(){
  var s={};IDS.forEach(function(id){s[id]={pts:0,w:0,d:0,l:0,gf:0,ga:0}});
  S.md.forEach(function(j){j.forEach(function(m){if(!m.played)return;var a=s[m.l],b=s[m.v];a.gf+=m.g1;a.ga+=m.g2;b.gf+=m.g2;b.ga+=m.g1;if(m.g1>m.g2){a.w++;a.pts+=3;b.l++}else if(m.g1<m.g2){b.w++;b.pts+=3;a.l++}else{a.d++;b.d++;a.pts++;b.pts++}})});
  if(S.manual&&S.mo)return S.mo.map(function(id){var r=s[id];return{id:id,pts:r.pts,w:r.w,d:r.d,l:r.l,gf:r.gf,ga:r.ga,pj:r.w+r.d+r.l}});
  return IDS.map(function(id){var r=s[id];return{id:id,pts:r.pts,w:r.w,d:r.d,l:r.l,gf:r.gf,ga:r.ga,pj:r.w+r.d+r.l}}).sort(function(a,b){return b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||a.id.localeCompare(b.id)});
}

function gz(p){var z=S.zones;if(z.chl.indexOf(p)>-1)return{c:'zc1',b:'zl1'};if(z.ell.indexOf(p)>-1)return{c:'zc2',b:'zl2'};if(z.ccl.indexOf(p)>-1)return{c:'zc3',b:'zl3'};if(z.desc.indexOf(p)>-1)return{c:'zd',b:'zld'};return{c:'',b:'zb'}}

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},1800)}
function openM(h){document.getElementById('mc').innerHTML=h;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}

function render(){
  _bc=0;var a=document.getElementById('app');
  var h='<header><div><h1>Liga <span>EASPORTS</span></h1><div class="sub">Temporada 2044/2045</div></div><span class="save-ind" id="saveInd"><i class="fas fa-check"></i> Guardado</span></header>';
  h+='<div class="tabs"><button class="'+(S.tab==='clas'?'on':'')+'" onclick="S.tab=\'clas\';save();render()">Clasificación</button><button class="'+(S.tab==='jorn'?'on':'')+'" onclick="S.tab=\'jorn\';save();render()">Jornadas</button></div>';
  h+=S.tab==='clas'?rTable():rJorn();
  a.innerHTML=h;
  if(S.tab==='jorn'){var el=document.querySelector('.jb.on');if(el)el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})}
}

function rTable(){
  var t=calc();var h='<div class="cd"><div class="ch"><h2>Clasificación general</h2><div style="display:flex;gap:5px;align-items:center"><button class="mbtn '+(S.manual?'on':'')+'" onclick="togMan()"><i class="fas fa-hand-pointer"></i> Manual</button><button class="btn btn-g" onclick="openZ()"><i class="fas fa-sliders-h"></i> Zonas</button></div></div><div class="tw"><table><thead><tr><th style="width:28px">#</th><th>Equipo</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GC</th><th>DG</th><th>Pts</th></tr></thead><tbody>';
  for(var i=0;i<t.length;i++){var r=t[i];var p=i+1;var z=gz(p);var gd=r.gf-r.ga;
    h+='<tr class="'+z.c+' '+z.b+' fi">';
    if(S.manual)h+='<td><div class="arr"><button onclick="mvT('+i+',-1)"><i class="fas fa-chevron-up"></i></button><button onclick="mvT('+i+',1)"><i class="fas fa-chevron-down"></i></button></div></td>';
    else h+='<td class="pos">'+p+'</td>';
    h+='<td><div class="tc">'+B(r.id)+'<span>'+T[r.id]+'</span></div></td>';
    h+='<td>'+r.pj+'</td><td>'+r.w+'</td><td>'+r.d+'</td><td>'+r.l+'</td><td>'+r.gf+'</td><td>'+r.ga+'</td>';
    h+='<td class="'+(gd>0?'mg':gd<0?'mr':'')+'">'+(gd>0?'+':'')+gd+'</td>';
    h+='<td style="font-weight:700;font-family:Oswald,sans-serif;font-size:14px">'+r.pts+'</td></tr>';}
  h+='</tbody></table></div></div>';
  h+='<div class="leg"><span><i style="background:var(--chl)"></i>Champions ('+S.zones.chl.length+')</span><span><i style="background:var(--ell)"></i>Europa League ('+S.zones.ell.length+')</span><span><i style="background:var(--ccl)"></i>Conference ('+S.zones.ccl.length+')</span><span><i style="background:var(--desc)"></i>Descenso ('+S.zones.desc.length+')</span></div>';
  /* Botón reset y exportar/importar */
  h+='<div class="reset-bar"><button class="btn btn-g" onclick="exportData()"><i class="fas fa-download"></i> Exportar</button><button class="btn btn-g" onclick="importData()"><i class="fas fa-upload"></i> Importar</button><button class="btn" style="background:var(--desc);color:#fff" onclick="resetData()"><i class="fas fa-trash"></i> Reset</button></div>';
  return h;
}

function rJorn(){
  var h='<div class="jnav">';
  for(var i=0;i<38;i++){var pl=S.md[i].filter(function(m){return m.played}).length;var dt=pl===10?'f':pl>0?'p':'n';h+='<button class="jb '+(i===S.ji?'on':'')+'" onclick="S.ji='+i+';save();render()">'+(i+1)+'<span class="dt '+dt+'"></span></button>'}
  h+='</div><div class="cd fi"><div class="ch"><h2>Jornada '+(S.ji+1)+'</h2><span style="font-size:10px;color:var(--muted)">'+S.md[S.ji].filter(function(m){return m.played}).length+'/10</span></div>';
  var jd=S.md[S.ji];
  for(var mi=0;mi<jd.length;mi++){var m=jd[mi];var wl=m.played?(m.g1>m.g2?'mg':m.g1<m.g2?'mr':''):'';
    h+='<div class="mrow"><span style="flex-shrink:0">'+B(m.l,18)+'</span><span class="mn">'+T[m.l]+'</span>';
    h+='<input class="si '+(m.played?'pl':'')+'" type="number" min="0" max="99" placeholder="-" value="'+(m.played?m.g1:'')+'" oninput="uS('+S.ji+','+mi+',\'g1\',this.value)" onfocus="this.select()">';
    h+='<span style="color:var(--muted);font-family:Oswald;font-size:11px">-</span>';
    h+='<input class="si '+(m.played?'pl':'')+'" type="number" min="0" max="99" placeholder="-" value="'+(m.played?m.g2:'')+'" oninput="uS('+S.ji+','+mi+',\'g2\',this.value)" onfocus="this.select()">';
    h+='<span class="mn r '+wl+'">'+T[m.v]+'</span><span style="flex-shrink:0">'+B(m.v,18)+'</span>';
    h+='<button class="db" onclick="delM('+S.ji+','+mi+')"><i class="fas fa-times"></i></button></div>'}
  var inMatch={};jd.forEach(function(m){inMatch[m.l]=1;inMatch[m.v]=1});
  var av2=IDS.filter(function(id){return !inMatch[id]});
  if(av2.length>=2){h+='<div class="ab"><select id="aL">'+av2.map(function(id){return '<option value="'+id+'">'+T[id]+'</option>'}).join('')+'</select><span class="vs">VS</span><select id="aV">'+av2.map(function(id,i){return '<option value="'+id+'" '+(i===1?'selected':'')+'>'+T[id]+'</option>'}).join('')+'</select><button onclick="addM()">Añadir</button></div>'}
  /* Botones de gestión en jornadas */
  h+='<div class="reset-bar"><button class="btn btn-g" onclick="exportData()"><i class="fas fa-download"></i> Exportar</button><button class="btn btn-g" onclick="importData()"><i class="fas fa-upload"></i> Importar</button></div>';
  h+='</div>';return h;
}

function uS(ji,mi,f,v){var m=S.md[ji][mi];m[f]=v===''?null:Math.max(0,parseInt(v)||0);m.played=m.g1!==null&&m.g2!==null;S.mo=null;S.manual=false;save();render()}
function delM(ji,mi){S.md[ji].splice(mi,1);S.mo=null;S.manual=false;save();render();toast('Eliminado')}
function addM(){var l=document.getElementById('aL').value,v=document.getElementById('aV').value;if(l===v){toast('Elige equipos diferentes');return}S.md[S.ji].push({l:l,v:v,g1:null,g2:null,played:false});save();render();toast('Añadido')}
function togMan(){S.manual=!S.manual;if(S.manual){var t=calc();S.mo=t.map(function(r){return r.id})}else{S.mo=null}save();render()}
function mvT(i,d){if(!S.mo)return;var n=i+d;if(n<0||n>=S.mo.length)return;var tmp=S.mo[i];S.mo[i]=S.mo[n];S.mo[n]=tmp;save();render()}

function openZ(){
  var h='<div class="mx-h"><h3>Configurar zonas</h3><button class="abtn" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="mx-b">';
  h+='<p style="font-size:11px;color:var(--muted);margin-bottom:12px">Posiciones separadas por comas</p>';
  var zones=[{k:'chl',l:'Champions League',c:'var(--chl)'},{k:'ell',l:'Europa League',c:'var(--ell)'},{k:'ccl',l:'Conference League',c:'var(--ccl)'},{k:'desc',l:'Descenso',c:'var(--desc)'}];
  for(var i=0;i<zones.length;i++){var z=zones[i];h+='<div class="sr"><div class="sc" style="background:'+z.c+'"></div><div class="sl">'+z.l+'</div><input class="si2" id="z_'+z.k+'" value="'+S.zones[z.k].join(',')+'"></div>'}
  h+='<div style="display:flex;gap:6px;margin-top:14px"><button class="btn" style="background:var(--accent);color:#000" onclick="savZ()">Guardar</button><button class="btn btn-g" onclick="closeModal()">Cancelar</button></div></div>';
  openM(h);
}
function savZ(){['chl','ell','ccl','desc'].forEach(function(k){var v=document.getElementById('z_'+k).value;S.zones[k]=v.split(',').map(function(s){return parseInt(s.trim())}).filter(function(n){return !isNaN(n)&&n>=1&&n<=20})});save();closeModal();render();toast('Zonas actualizadas')}

/* ===== EXPORTAR / IMPORTAR ===== */
function exportData(){
  var data=JSON.stringify({md:S.md,z:S.zones,man:S.manual,mo:S.mo,tab:S.tab,ji:S.ji,v:2});
  var blob=new Blob([data],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='liga_2045_backup.json';a.click();
  URL.revokeObjectURL(url);
  toast('Datos exportados');
}

function importData(){
  var h='<div class="mx-h"><h3>Importar datos</h3><button class="abtn" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="mx-b">';
  h+='<p style="font-size:11px;color:var(--muted);margin-bottom:12px">Selecciona el archivo de backup (.json) que exportaste antes</p>';
  h+='<input type="file" accept=".json" id="importFile" style="width:100%;font-size:13px;color:var(--fg)">';
  h+='<div style="display:flex;gap:6px;margin-top:14px"><button class="btn" style="background:var(--accent);color:#000" onclick="doImport()">Importar</button><button class="btn btn-g" onclick="closeModal()">Cancelar</button></div></div>';
  openM(h);
}

function doImport(){
  var file=document.getElementById('importFile').files[0];
  if(!file){toast('Selecciona un archivo');return}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.md||data.md.length!==38){toast('Archivo no válido');return}
      S.md=data.md;
      if(data.z)S.zones=data.z;
      if(typeof data.man==='boolean')S.manual=data.man;
      if(data.mo)S.mo=data.mo;
      if(data.tab)S.tab=data.tab;
      if(typeof data.ji==='number')S.ji=data.ji;
      save();closeModal();render();toast('Datos importados correctamente');
    }catch(err){toast('Error al leer el archivo')}
  };
  reader.readAsText(file);
}

function resetData(){
  var h='<div class="mx-h"><h3>Resetear todo</h3><button class="abtn" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="mx-b">';
  h+='<p style="font-size:13px;margin-bottom:6px">Se borrarán todos los resultados y la clasificación volverá a los datos originales.</p>';
  h+='<p style="font-size:12px;color:var(--desc);margin-bottom:14px">Esta acción no se puede deshacer.</p>';
  h+='<div style="display:flex;gap:6px"><button class="btn" style="background:var(--desc);color:#fff" onclick="doReset()">Sí, borrar todo</button><button class="btn btn-g" onclick="closeModal()">Cancelar</button></div></div>';
  openM(h);
}

function doReset(){
  localStorage.removeItem(STORAGE_KEY);
  S.zones={chl:[1,2,3,4],ell:[5],ccl:[6],desc:[18,19,20]};
  S.manual=false;S.mo=null;S.tab='clas';S.ji=0;
  parseMD();save();closeModal();render();toast('Datos reseteados');
}

document.getElementById('fab').onclick=function(){
  var mx=0;WAGES.forEach(function(w){if(w.a>mx)mx=w.a});var h='<div class="mx-h"><h3>Masa salarial anual</h3><button class="abtn" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="mx-b"><p style="font-size:11px;color:var(--muted);margin-bottom:10px">Millones de euros</p>';
  for(var i=0;i<WAGES.length;i++){var w=WAGES[i];h+='<div class="wr"><div class="wp">'+(i+1)+'</div>'+B(w.id,18)+'<span style="font-size:12px;flex:1">'+T[w.id]+'</span><div class="wbf"><div class="wff" style="width:'+Math.round(w.a/mx*100)+'%"></div></div><div class="wa">'+w.a+'M</div></div>'}
  h+='</div>';openM(h);
};

render();
</script>
</body>
</html>
